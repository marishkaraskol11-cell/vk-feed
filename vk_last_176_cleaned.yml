Станет отличным решением для простой болт он установки реплики блоуоффа из нашего ассортимента на Subaru Forester SF SG и другие машины этой марки агрегатированные моторами серии EJ с "прямым" фланцем байпаса

Данная деталь изготавливается на ЧПУ, поэтому точность размеров и качество прилегающих поверхностей на высоте.

Многие наши клиенты говорят о совместимости с Legasy be-bh, Forester SF 98+, SG 2001-2004г (на кулера с ровной вертикальной площадкой- НЕ КАК У IMPREZA!!!)
Встанет на Legacy bl-bp,Forester SH, Impreza GH с доработкой (пересверливанием либо рассверливанием одно из отверстий)

Пожалуйста обратите внимание на посадочные размеры - данная проставка 100% совместима с репликой оригинального изделия серий HKS из нашего ассортимента. Оригинальный HKS и реплики других производителей могут c небольшой вероятностью иметь другие размеры. так же стоит обратить внимание что данный адаптер не комплектуется прокладками, учитывайте это при заказе.

Моторы марки субару имеют несколько типов фланца байпаса, пожалуйста проверяйте размерность до заказа, так же стоит учитывать тот факт что допустим если на форестер поставили куллер импрезы, то проставка может подойти по размерам, а блоуофф на ней упрется в капот.

