Термошуба, одеяло, термоизоляция или чехол турбины для горячей улитки средних размеров из базальтового волокна. Решение для турбин с ЕГТ выше среднего. Подходит на турбины до 3076, 3037

Характеристика:

• Рабочая температура 700-800 градусов, пиковая (до 15-20секунд) 1000 градусов
• Изготовлено с применениям базальтовой нити

Термочехлы и термоленты позволяют сохранять температуру коллектора и горячей части турбины. Энергия выхлопных газов не рассеивается и сохраняет больший объем для выхлопных газов, что положительно сказывается на выходе не рабочее давление: лучше заметно на больших турбинах. Побочный плюс использования термочехла турбины - снижение общей температуры подкапотного пространства, как следствие меньший нагрев компонентов впуска.

Применение композитных материалов, и многослойность конструкции позволит использовать термочехол при температуре до 1000 градусов выхлопных газов, внутренние слои с использованием плетеной сетки из нержавеющей стали задают форму и сохраняют ее. Все это так же позволяет не раз снять термочехол для возможного ремонта.

