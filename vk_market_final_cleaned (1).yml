Цена за пару.

Самое распространенное решение для стандартных и нестандартных колес в зависимости от ширины фендера.

Накладки, защиты и фендера служат одной цели - защитить кузов от агрессивных воздействий, контактов, продлить жизнь лакокрасочному покрытию а так же создать неповторимый вид авто.

Данные расширители изготовлены из двух миллиметрового АБС пластика. Легко подгоняются практически под любой автомобиль при помощи строительного фена!

Требуют профессиональной установки

Изделие продается под покраску. Возможны царапины и потертости

Для крепления декоративных фендеров существует множество вариантов крепления:

1) Двухсторонние липкие ленты, без проблем могут работать с легким абс пластиком, но нуждаются в высоком качестве самой ленты, подготовки поверхностей, использование праймеров и тд.

2) Герметики, клеи. Можно использовать и их, но могут возникнуть проблемы при снятии фендера с лкп

3) Не самый лучший и эстетичный способ - саморезы со сверлом из строительного.

4) Лучший - использовать клепки вытяжные с внутренней резьбой М6 и довольно красивые болты M6*15mm под титан под шестигранник SS. Подобное соединение разъемно и очень эстетично.

Характеристика:

• 2 фендера шириной 30мм
• Материал: ABS пластик, под покраску
• Толщина: 2мм.

