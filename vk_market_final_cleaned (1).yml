Термошуба, одеяло, термоизоляция или чехол турбины для горячей улитки больших размеров из базальтового волокна с добавлением карбона. Решение для турбин с ЕГТ выше среднего. Подходит на турбины 3582 и выше

Термочехлы и термоленты позволяют сохранять температуру коллектора и горячей части турбины. Энергия выхлопных газов не рассеивается и сохраняет бОльший объем для выхлопных газов, что положительно сказывается на выходе не рабочее давление: лучше заметно на больших турбинах. Побочный плюс использования термочехла турбины - снижение общей температуры подкапотного пространства, как следствие меньший нагрев компонентов впуска.

Применение композитных материалов, и многослойность конструкции позволит использовать термочехол при температуре до 1100 градусов выхлопных газов, внутренние слои с использованием плетеной сетки из нержавеющей стали задают форму и сохраняют ее. все это так же позволяет не раз снять термочехол для возможного ремонта.

Характеристика:

• Рабочая температура 700-800 градусов, пиковая (до 15-20секунд) 1100 градусов
• Размер Т4

Данная термошуба подходит для следующий турбин:

• турбина GT3582 со втулками Т4
• турбина GT45
• турбина Т3\Т4 с актуатором
• турбина Т3\Т4 с актуатором #2
• турбина Т3\Т4 шарикоподшипниковая №3

