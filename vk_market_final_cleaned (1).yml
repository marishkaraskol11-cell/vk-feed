В рычагах используются сменные резиновые сайлентблоки, что позволяет использовать авто каждый день.
Нужны для сужения или расширения задней колеи без смещения колес.

Характеристика:

• Материал: сталь 4 и 8мм (09г2с) с полимерным покрытием.

Задние нижние рычаги имеют диапазон регулировок (-10; +20мм) позволяет менять угол развала сзади с расширением/сужением колеи, без изменения колёсной базы (без смещения колеса вперёд/назад).

Если вы хотите наваливать боком, то задние колеса нужно выводить в ноль, а для стилёвого стенса колеса нужно ронять в жёсткий минус.

Регулировка осуществляется на любой станции, где есть стенд сход-развала.

Устанавливается комплект болт он, и не требует дополнительных доработок.

В рычагах сайлентблоки Febest NAB-130 и штатные шаровые Nissan Skyline Febest 0220-C34.

