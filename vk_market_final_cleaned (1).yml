Применение композитных материалов, и многослойность конструкции позволит использовать термочехол при температуре до 700 градусов выхлопных газов, внутренние слои с использованием плетеной сетки из нержавеющей стали задают форму и сохраняют ее. все это так же позволяет не раз снять термочехол для возможного ремонта.

