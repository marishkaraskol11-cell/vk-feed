Дополнительный радиатор АТФ для коробки-автомата, рулевого управления или редуктора

Дополнительные радиаторы для АКПП и трансмиссии необходимы, чтобы избавиться от ее перегрева, увеличивая тем самым ресурс работы. Они устанавливаются в разрыв системы между коробкой передач и теплообменником в основном радиаторе. При использовании дополнительного радиатора увеличивается срок эксплуатации не только комплектующих самой АКПП, но и ресурс масла.

Радиаторы на АКПП и трансмиссию делают езду более комфортной, способствуют более плавному переключению передач, а также защищают двигатель и ходовую от перегрузок.

Характеристика:

• Размер ядра 300х190 мм;
• Толщина 19 мм;
• Размеры штуцера — 10 мм.

Предназначен для снижения температуры редуктора, ГУР, автоматической коробки передач и других деталей автомобиля при давлении масла в системе не больше трех кг. Для охлаждения двигателя не используется. Максимальное давление масла — 3 кг.

Установка устройства производится через кронштейны либо хомуты в нахлест на основной радиатор. В набор помимо самого кулера также входит шланг и стяжки или хомуты для подключения.

Подходит для установки на агрегаты с входным штуцером 9,5 мм.

