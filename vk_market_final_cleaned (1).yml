Nissan President (яп. 日産・プレジデント) — японский представительский лимузин, выпускавшийся компанией Nissan с 1965 по 2010 годы. Автомобиль, в основном, используется руководителями компаний и государственными чиновниками. Это представительский седан, специально направленный на японский рынок, для конкуренции с Toyota Century.

Модель имеет высокую степень детализации с множеством конструктивных подробностей - проработана подвеска (колеса крутятся, поворачиваются), салон и моторный отсек. Собранная машина смотрится очень реалистично:

- Покрышки из синтетической резины с оригинальным рисунком протектора;
- Колёсные диски и отражатели фар с металлическим напылением;
- Эмблемы и зеркала заднего вида из металла;
- Детали для передних фар и задних фонарей в комплекте.

Благодаря понятной схеме модель сможет собрать как опытный, так и начинающий моделист.

В данном наборе поставляется:
- Детали для склеивания одной модели;
- Декали для нанесения на кузов;
- Иллюстрированная инструкция на английском и японском языках.

Сборная модель - это отличный подарок для мужчин: отца, брата, мужа или сына на Новый год, день рождения, 23 Февраля.

Сборка элементов осуществляется при помощи специального клея.

Клей и краски в комплект не входят и приобретаются отдельно.

