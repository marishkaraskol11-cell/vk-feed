Замки отключения привода (также известные как хабы, муфты свободного хода, локи), устанавливаются на ступицы передних колёс полноприводных автомобилей. Они предназначены для механического подключения/отключения полного привода непосредственно на колесе.

Рекомендации по эксплуатации муфт свободного хода:

• Хабы можно промывать соляркой или керосином, а смазывать обыкновенным моторным маслом.
• Не рекомендуется использовать густые смазки, они могут препятствовать правильному включению муфты, особенно в условиях низких температур, что может привести к повреждению шлицев.
• Если полный привод используется крайне редко, хабы могут закиснуть., чтобы этого избежать нужно периодически подключать полный привод.
• Недопустимо двигаться на автомобиле с подключенным полным приводом и отключенными хабами .
