GBRAKE (Япония) - производство дисковых и барабанных тормозных колодок, фрикционных накладок и тормозных дисков. Производственные мощности расположены как в Японии, так и за ее пределами.

Торговая марка GBRAKE принадлежит японской корпорации Union Motor Co., Ltd. Компания образована в 1963 году и хорошо известна во многих странах как надежный поставщик автомобильных комплектующих. Головной офис находится в городе Осака, Япония. В 2013 году компания отметила свой 50-летний юбилей.

Все заводы сертифицированы по стандартам ISO 9001, ISO 9002, ISO 14001, ECE R90, а продукция имеет допуски TUV, E1, E10, E11, E20. Используемые фрикционные материалы создаются только по безасбестовой технологии, с учетом всех современных экологических требований. Самая последняя разработка компании, технология “Organic formula”, позволила полностью отказаться от применения меди в составе фрикционных компонентов.

