Эти рычаги отвечают за развал и ширину задней колеи. Позволяют точно настроить схождение колес, обеспечивая стабильность автомобиля при агрессивной езде и повышенную управляемость при прохождении поворотов.

Задние поперечные рычаги имеют диапазон регулировок (-20мм; +20мм), что позволит вытащить развал в 0, что так необходимо в дисциплине дрифт. В стенсе помогут аккуратно уложить колеса в арки.

Регулировка осуществляется на любой станции, где есть стенд сход-развала.

Устанавливается комплект болт он, и не требует дополнительных доработок.

В рычагах сайлентблоки FEBEST NAB-128. Их можно заменить на более мягкие или жесткие.

Номера замен ОЕМ: 55110-70T00

