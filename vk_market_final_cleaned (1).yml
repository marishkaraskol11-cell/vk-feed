Задний поперечный рычаг на тойота марк 2, чайзер, креста JZX90 JZX100 с резиновым сайлентблоком.

Нужен для угла заднего развала, рычаг с регулировкой и ушками.

Рычаги отвечают за развал и ширину задней колеи.

Характеристика:

• Комплект - 2 рычага
• Материал - сталь, шс с пыльниками
• Длина в скрученном состоянии - 415 мм
• Длина в раскрученном состоянии - 486 мм
• Внешняя ширина втулки - 43 мм, 56 мм
• Диаметр ЦО - 12 мм
• Цена за пару

Данное решение придется по вкусу как в стенсе, так и в автоспортивных дисциплинах.

Для адекватной настройки подвески рекомендуется использовать вкупе с другими регулируемыми рычагами - схождения и реактивной и получить полный спектор настроек задней оси.

Рычаги на стандартных ОЕМ сайлентблоках, замена сайлентблока по номеру стандартного рычага 48730-30070. Обслуживание рычагов максимально простое, как в стоке.

