C-образный станет отличным решением для популярных авто Nissan - Silvia S14 S15, Skyline R33 R34, Laurel C35.

Пара задних развальных верхних рычагов с регулировкой и на ШС с пыльником - позволят настроить развал под свои нужды, поскольку рычаг верхний - регулировка происходит без расширения клеи.

Рекомендуется использовать в паре с верхним рычагом схождения - в крайних положениях регулировки развального не получится настроить схождение задней оси.

Особенностью данного рычага является измененная геометрия для лучшей работы при занижении.

Характеристика:

• Комплект из двух рычагов с регулировкой. материал - сталь, шс с пыльниками
• Длина в скрученном состоянии - 260мм
• Длина в раскрученном состоянии - 330мм
• Диаметр ЦО - 12мм/14мм
• Цена указана за пару

