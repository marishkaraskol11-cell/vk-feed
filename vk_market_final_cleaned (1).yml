Позволяет установить или снять рулевое колесо одним движением. Данная деталь была разработана для спортивных автомобилей, но в последнее время приобрела популярность в тюнинге благодаря своей функциональности и удобству применения. Муфта подходит практически ко всем тюнинговым и спортивным рулям.

Муфта состоит из двух частей: одна часть устанавливается на рулевой переходник, на другую монтируется руль.

Соединение выполнено на направляющих с надёжной фиксацией. Для снятия руля нужно нажать на фиксатор, повернуть рулевое колесо на четверть оборота и потянуть на себя.

