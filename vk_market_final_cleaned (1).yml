Подушка или опора автомата для Mark 2, Chaser, Cresta в кузовах jzx90, 100, 110. Решение для спортивной контролируемой езды, драга и и иных автодисциплин.

При агрессивном стиле вождения, резко трогаться с места и резко тормозить, стандартные подушки просто не смогут прослужить свой срок службы.

Оригинальная деталь может выйти из строя и оставить вашу передачу отключенной от шасси в самый неподходящий момент во время заезда.

Жесткое крепление коробки передач уменьшает движение трансмиссии при резких ускорениях, замедлениях и поворотах.

Большие сайлентблоки (CTR CVKH-166) позволяют поглощать экстремальные вибрации, предотвращая сильное перемещение коробки передач при экстремальных нагрузках.

При их износе вы легко можете их перепресовать, что делает наши подушки ремонтопригодными.

Выполненные из прочной 4мм стали с оцинкованным покрытием, подушки прослужат очень долго.

Подушки устанавливаются болт-он в штатные места и не требуют доработки

