Радиатор масляный с установкой в разрыв между кулером и коробкой передач.

Дополнительные радиаторы для АКПП и трансмиссии необходимы, чтобы избавиться от ее перегрева, увеличивая тем самым ресурс работы. Они устанавливаются в разрыв системы между коробкой передач и теплообменником в основном радиаторе. При использовании дополнительного радиатора увеличивается срок эксплуатации не только комплектующих самой АКПП, но и ресурс масла.

Радиаторы на АКПП и трансмиссию делают езду более комфортной, способствуют более плавному переключению передач, а также защищают двигатель и ходовую от перегрузок

Характеристика:

• Размеры ядра — 300х250 мм;
• Толщина — 19 мм;
• Диаметр входного штуцера — 9,5 мм.

Назначение

Радиатор АКПП АТФ 300-250-19 используется для понижения температуры в системах с давлением масла в пределах 3 кг — автоматические коробки передач, гидроусилители руля, редуктор и др. Для монтажа на двигатели внутреннего сгорания не подходит.

К системе подключается через кронштейны или хомуты на основной радиатор либо около него.

