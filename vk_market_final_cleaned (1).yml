Теншены, косые рычаги, реактивные тяги тойота марк 2, чайзер, веросса, прогрес, краун для регулировки кастора и настройки передней подвески. Сделаны на ШС для эффективности и надежности, при больших углах резиновые или PU сайленты не работают. С этим рычагов начинается любой дрифт или стиль.

Заменит ОЕМ 48660-30221, 48670-30221, 48660-51020, 48670-51020

Новый вариант передних реактивных тяг или косых рычагов предназначен для спортивного применения.

Они по прежнему на ШС и дают возможность регулировки кастора, но больший угол изгиба гарантирует, что при даже самом огромном вывороте колесо не будет касаться рычага.

Другая особенность новых рычагов – их универсальность для jzx90-100-110-Altezza за счет доработки крепежных элементов.

Совместимость:

