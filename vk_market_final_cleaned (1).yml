Фаркоп под квадрат или, как его еще называют, американский фаркоп на GWM Tank 300 2022- очень удобен в эксплуатации, благодаря быстросъемной части. В нашем интернет-магазине вы можете купить фаркоп под американский квадрат, рама которого устанавливается в штатные места, предусмотренные заводом-изготовителем. Диаметр шара — 50 мм.

Преимущества конструктива фаркопа съемный квадрат:

• Требуется не более 10 секунд на снятие/установку тягового кронштейна;
• Для снятия /установки не требуется специальный инструмент;
• В основном блоке возможно использовать другие изделия с креплением «под квадрат»;
• Возможность регулировать горизонтальный уровень сцепки в пределах понижения фаркопа переворачиванием съемного кронштейна;
• Возможность заменить как съемный кронштейн целиком, так и отдельно сцепной шар.

Материал:

Фаркоп изготавливается из высокопрочной стали СТ3. Металл окрашивается порошковой краской. Шар фаркопа изготавливается из высокопрочных марок стали в соответствии с ГОСТ Р 1050 либо ГОСТ 19281 с последующим электролитическим покрытием никелем.

Площадка под крепление шара — толщина 16 мм.

Комплектация:

ТСУ укомплектован всем необходимым для установки на автомобиль. Полный перечень деталей указан в инструкции по установке.
Внимание! Комплект электрики не включен в комплектацию фаркопа. Он приобретается отдельно.

Требования к эксплуатации изделия:

• Фиксирующий болт М10х20 предназначен для устранения технологических люфтов у НЕнагруженного изделия. При установке любого нагружающего устройства (прицеп, велокрепление и т.д.) болт необходимо ослабить. Эксплуатация ТСУ (фаркопа) с затянутым фиксирующим болтом ЗАПРЕЩЕНА, так как может привести к деформации изделия.
• Периодически очищайте поверхность детали от грязи и пыли, не пользуясь абразивными материалами, кислотными и щелочными очищающими составами, удаляйте снег и грязь, чтобы поверхность детали оставалась сухой и чистой. При небольших повреждениях покрытия обработайте деталь преобразователем ржавчины и аккуратно покройте место повреждения подходящей краской.
• Производитель гарантирует соответствие изделия характеристикам указанным в паспорте в течение гарантийного срока при соблюдении требований по установке и эксплуатации. Гарантия снимается если дефекты возникли по вине потребителя или третьих лиц в результате нарушения правил транспортировки, хранения, монтажа, условий эксплуатации, а так же внесении изменений и доработок в конструкцию без согласования с производителем. Производитель не несёт ответственности за нанесение ущерба имуществу третьих лиц в результате неправильного хранения и эксплуатации изделия.

Характеристики:

Производитель: PT GROUP

Марка авто: GREAT WALL

Модель авто: Tank 300

Габариты: 50 х 20 х 22 см

Объем в упаковке: 0,022 м³

Вес: 6,8 кг

Материал: Сталь с полимерной порошковой краской

Максимальная масса прицепа по данным производителя ТСУ: 3000 кг

При монтаже съем бампера: Нет необходимости

Подрезка бампера: Не нужна

Тип шара: E

Правила безопасного использования:

• Каждые 5000 км необходимо протягивать соединительные элементы изделия.
• На неасфальтированных покрытиях скорость движения с прицепом не должна превышать 30 км/ч.
• Требуется установка в специализированном сервисном центре.

