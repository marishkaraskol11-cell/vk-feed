фильтр HKS style, грибок HKS, фильтр нулевик 102мм, фильтр 102 мм, зеленый грибок, для турбо, для турбированного двигателя, для большого объема, влажный тип, поролоновый, обслуживаемый, сменный элемент, для лодки, для катера, водомоторная техника, переходник на 102, тюнинг впуска, воздушный фильтр грибок.

