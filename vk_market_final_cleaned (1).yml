Данные амортизаторы однотрубной конструкции, т.е. представляют из себя трубу, заполненную рабочей жидкостью, в которой перемещается поршень с клапанами. Для компенсации изменения объёма рабочей жидкости (температурные и вход-выход штока) «дно» цилиндра заполнено газом, отделённым от рабочей жидкости плавающим поршнем-перегородкой. Давление газа, как правило около 18-25 атмосфер (для улучшения характеристик рабочей жидкости при нагреве и устранения вероятности возникновения кавитации).

Плюсы: очень стабильные характеристики при активном использовании, большая скорость реакции, неизменность характеристик от угла установки

Минусы: сложней в изготовлении, обслуживании и ремонте чем двухтрубный, имеет меньший ход по сравнению с двухтрубной конструкцией, требователен к чистоте и качеству поверхностей и уплотнений.

Данные стойки неплохо себя показывают в смешанном режиме эксплуатации – городской и легкий любительский спорт на дорогах общего пользования без повышенных нагрузок автоспорта. Их запрещается эксплуатировать в автоспорте и на треке.

